<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shniro | Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    
    <!-- Icons & PWA -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(circle at top left, #0f766e, #020617);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        /* Abstract Background Elements */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #64ffda, #00c6ff);
            filter: blur(40px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 255, 218, 0.3);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64ffda;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #64ffda);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.5;
        }

        .auth-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-tab.active {
            background: rgba(100, 255, 218, 0.1);
            color: #64ffda;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: rgba(100, 255, 218, 0.8);
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            outline: none;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #64ffda;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
        }

        .form-group input:focus + i {
            color: #64ffda;
        }

        .auth-btn {
            margin-top: 15px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #64ffda, #00c6ff);
            color: #0a192f;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 255, 213, 0.2);
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 213, 0.4);
        }

        .auth-btn:active {
            transform: translateY(-1px);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #64ffda;
            transform: translateX(-5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; opacity: 0; }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 255, 218, 0.3);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
            font-size: 14px;
            font-weight: 500;
        }

        .toast.error { border-color: #ef4444; }
        .toast.success { border-color: #64ffda; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="glass auth-card">
        <div class="auth-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i data-lucide="zap" stroke-width="2.5"></i>
                </div>
            </div>
            <h1>Shniro</h1>
            <p id="authSubtitle">The smartest way to solve and learn.</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    <i data-lucide="mail"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <i data-lucide="lock"></i>
                </div>
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <form id="signupForm" class="auth-form hidden">
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="signupUsername" placeholder="your_name" required>
                    <i data-lucide="user"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    <i data-lucide="mail"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPassword" placeholder="Minimum 6 characters" required>
                    <i data-lucide="lock"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <i data-lucide="shield-check"></i>
                </div>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <a href="/" class="back-link">
            <i data-lucide="arrow-left"></i> Back to Solver
        </a>
    </div>

    <script>
        lucide.createIcons();

        // Only redirect if we just logged in or if the user explicitly wants to go back
        // We avoid auto-redirecting here to prevent loops if the cookie is missing but storage is not

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const subtitle = document.getElementById('authSubtitle');
            const tabs = document.querySelectorAll('.auth-tab');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                subtitle.textContent = 'Welcome back! Please login to your account.';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                subtitle.textContent = 'Join Shniro and unlock premium features.';
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }
        
        // Login Logic
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = e.target.querySelector('button');
            
            try {
                btn.disabled = true;
                btn.textContent = 'Logging in...';
                
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                
                localStorage.setItem('shniro_user', JSON.stringify(data.user));
                showToast('Welcome back, ' + data.user.username + '!');
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        };
        
        // Signup Logic
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button');
            
            if (password !== confirmPassword) return showToast('Passwords do not match!', 'error');
            
            try {
                btn.disabled = true;
                btn.textContent = 'Creating Account...';
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Signup failed');
                
                showToast('Account created! Logging you in...');
                
                // Automatically log in after signup
                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();
                
                if (loginRes.ok) {
                    localStorage.setItem('shniro_user', JSON.stringify(loginData.user));
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    switchTab('login');
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        };
    </script>
</body>

</html>
